[build]
  base = "."
  command = "bun install --frozen-lockfile && bun run build"
  publish = "app/dist"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION = "1.2.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
